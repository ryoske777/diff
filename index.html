<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문자 DIFF 비교</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #14161a;
    --panel: #1c2027;
    --panel-2: #232831;
    --border: #2e3540;
    --text: #e4e7ec;
    --muted: #8a93a2;
    --del-bg: #4a2230;
    --del-text: #ff97ae;
    --ins-bg: #1f3d2a;
    --ins-text: #7ee2a0;
    --accent: #5b9dff;
    --accent-soft: #1f2e47;
    --focus: #ffcb47;
    --mono: ui-monospace, "SFMono-Regular", "Cascadia Code", Consolas, "D2Coding", monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: -0.3px; }
  header .sub { color: var(--muted); font-size: 13px; }
  .toolbar { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button {
    font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 14px; cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  button:hover { background: #2a313c; border-color: #3a424f; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0a1220; font-weight: 600; }
  button.primary:hover { background: #6fa9ff; }
  label.chk { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; user-select: none; }

  .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .input-cell { display: flex; flex-direction: column; background: var(--bg); position: relative; }
  .input-cell .cap { padding: 10px 16px 6px; font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: .5px; display: flex; align-items: center; gap: 8px; }
  .input-cell .cap .file-btn {
    margin-left: auto; font-size: 11px; padding: 3px 9px; font-weight: 500;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; color: var(--accent);
  }
  .input-cell .cap .file-btn:hover { background: #2a313c; }
  .file-tag {
    display: none; align-items: center; gap: 6px; margin: 0 16px 4px;
    font-size: 11px; font-family: var(--mono); color: var(--ins-text);
    background: #17321f; border: 1px solid #2a4d34; border-radius: 6px; padding: 3px 8px; width: fit-content;
  }
  .file-tag.show { display: inline-flex; }
  .file-tag .x { cursor: pointer; color: var(--muted); font-weight: 700; padding: 0 2px; }
  .file-tag .x:hover { color: var(--del-text); }
  .sheet-bar {
    display: none; align-items: center; gap: 8px; margin: 0 16px 6px;
  }
  .sheet-bar.show { display: flex; }
  .sheet-bar .sheet-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .5px; }
  .sheet-select {
    flex: 1; max-width: 280px; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px;
    font-size: 12px; font-family: var(--mono); outline: none; cursor: pointer;
  }
  .sheet-select:focus { border-color: var(--accent); }
  .input-cell.dragover::after {
    content: "파일을 놓으세요 (.xlsx .xls .csv .txt)";
    position: absolute; inset: 0; z-index: 5;
    display: flex; align-items: center; justify-content: center;
    background: rgba(91,157,255,.12); border: 2px dashed var(--accent); border-radius: 10px;
    color: var(--accent); font-size: 14px; font-weight: 600; pointer-events: none;
  }
  .input-cell.parsing::after {
    content: "파일 읽는 중...";
    position: absolute; inset: 0; z-index: 5;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20,22,26,.85); color: var(--muted); font-size: 14px; pointer-events: none;
  }
  textarea {
    min-height: 130px; resize: vertical; background: var(--panel); color: var(--text);
    border: none; padding: 14px 16px; font-family: var(--mono); font-size: 14px;
    line-height: 1.7; outline: none;
  }
  textarea:focus { background: #20252e; }

  /* ---- 상단: 차이 바로가기 목록 ---- */
  .diff-head {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .stat { font-size: 13px; color: var(--muted); }
  .stat b { color: var(--text); font-variant-numeric: tabular-nums; }
  .stat .del-c { color: var(--del-text); }
  .stat .ins-c { color: var(--ins-text); }
  .filter-box { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .filter-box input[type=text] {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); padding: 6px 10px; font-size: 13px; font-family: var(--mono); width: 180px; outline: none;
  }
  .filter-box input[type=text]:focus { border-color: var(--accent); }

  .diff-list-wrap { padding: 12px 24px 4px; }
  .diff-list { /* 가상 스크롤 컨테이너 */
    position: relative; max-height: 46vh; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 10px; background: var(--panel);
  }
  .diff-spacer { position: relative; width: 100%; }
  .diff-row {
    position: absolute; left: 0; right: 0;
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px; border-bottom: 1px solid var(--border);
    cursor: pointer; height: 38px; overflow: hidden;
  }
  .diff-row:hover { background: var(--panel-2); }
  .diff-row .idx {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    min-width: 46px; text-align: right; flex-shrink: 0;
  }
  .seg { font-family: var(--mono); font-size: 13px; padding: 2px 7px; border-radius: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40%; }
  .seg.from { background: var(--del-bg); color: var(--del-text); }
  .seg.to { background: var(--ins-bg); color: var(--ins-text); }
  .seg.empty { color: var(--muted); background: transparent; font-style: italic; opacity: .7; }
  .arrow { color: var(--muted); flex-shrink: 0; font-size: 13px; }
  .pos-tag {
    margin-left: auto; flex-shrink: 0; font-family: var(--mono); font-size: 11px;
    color: var(--accent); background: var(--accent-soft); border: 1px solid #2c3f5e;
    border-radius: 6px; padding: 1px 7px;
  }
  .empty-msg { padding: 60px 24px; text-align: center; color: var(--muted); font-size: 14px; }

  /* ---- 하단: 원본/대조군 패널 (토글) ---- */
  .panel-controls {
    display: flex; gap: 18px; align-items: center;
    padding: 14px 24px; border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .panel-controls .pc-label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: .5px; }
  .panes { display: grid; gap: 1px; background: var(--border); }
  .panes.cols-2 { grid-template-columns: 1fr 1fr; }
  .panes.cols-1 { grid-template-columns: 1fr; }
  .panes.cols-0 { display: none; }
  .pane { background: var(--panel); display: flex; flex-direction: column; }
  .pane[hidden] { display: none; }
  .pane-title { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: .5px; padding: 14px 24px 10px; }
  .pane-scroll {
    position: relative;
    max-height: 60vh; overflow-y: auto; padding: 0 24px 24px;
    font-family: var(--mono); font-size: 14px; line-height: 1.9;
    white-space: pre-wrap; word-break: break-word;
  }
  .chunk { border-radius: 4px; padding: 1px 2px; }
  .chunk.del { background: var(--del-bg); color: var(--del-text); }
  .chunk.ins { background: var(--ins-bg); color: var(--ins-text); }
  .chunk.flash { animation: flash 1.1s ease; }
  @keyframes flash {
    0% { outline: 2px solid var(--focus); outline-offset: 2px; box-shadow: 0 0 0 4px rgba(255,203,71,.25); }
    100% { outline: 2px solid transparent; box-shadow: 0 0 0 4px rgba(255,203,71,0); }
  }
  .panel-note { padding: 10px 24px; color: var(--muted); font-size: 12px; }

  @media (max-width: 720px) {
    .inputs, .panes.cols-2 { grid-template-columns: 1fr; }
    .toolbar { width: 100%; margin-left: 0; }
    .seg { max-width: 30%; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>문자 DIFF 비교</h1>
    <div class="sub">차이만 추려 위치별로 바로가기</div>
  </div>
  <div class="toolbar">
    <label class="chk"><input type="checkbox" id="ignoreWs"> 공백 무시</label>
    <button id="sampleBtn">예시</button>
    <button id="clearBtn">지우기</button>
    <button id="runBtn" class="primary">비교 실행</button>
  </div>
</header>

<section class="inputs">
  <div class="input-cell" id="cellLeft">
    <div class="cap">원본 (ORIGINAL)
      <button class="file-btn" data-pick="left">파일 첨부</button>
    </div>
    <div class="file-tag" id="tagLeft"><span class="name"></span><span class="x" data-clearfile="left">✕</span></div>
    <div class="sheet-bar" id="sheetBarLeft">
      <span class="sheet-label">시트</span>
      <select class="sheet-select" id="sheetSelLeft"></select>
    </div>
    <input type="file" id="fileLeft" accept=".xlsx,.xls,.csv,.txt,.tsv" hidden>
    <textarea id="left" placeholder="원본 텍스트를 입력하거나 파일을 드래그하세요..."></textarea>
  </div>
  <div class="input-cell" id="cellRight">
    <div class="cap">대조군 (COMPARED)
      <button class="file-btn" data-pick="right">파일 첨부</button>
    </div>
    <div class="file-tag" id="tagRight"><span class="name"></span><span class="x" data-clearfile="right">✕</span></div>
    <div class="sheet-bar" id="sheetBarRight">
      <span class="sheet-label">시트</span>
      <select class="sheet-select" id="sheetSelRight"></select>
    </div>
    <input type="file" id="fileRight" accept=".xlsx,.xls,.csv,.txt,.tsv" hidden>
    <textarea id="right" placeholder="비교할 텍스트를 입력하거나 파일을 드래그하세요..."></textarea>
  </div>
</section>

<section id="resultWrap">
  <div class="empty-msg">텍스트를 입력하고 <b>비교 실행</b>을 누르세요.</div>
</section>

<script>
const $ = s => document.querySelector(s);

/* ================= diff 알고리즘 ================= */
/* 대용량 대비:
   1) 양끝 공통 접두/접미를 먼저 잘라낸다 (실제 입력에서 비교 영역을 크게 줄임)
   2) 줄(line) 단위로 1차 LCS → 동일한 줄은 통과, 바뀐 줄 블록만 글자 단위로 정밀 비교
   결과적으로 글자 단위 O(n*m) 비교는 "바뀐 부분"에만 적용 → 수만 줄도 가볍다. */

function splitLines(s){ return s.length ? s.split(/(?<=\n)/) : []; }

function lcsOps(a, b, eq){
  const n=a.length, m=b.length;
  const dp = Array.from({length:n+1}, ()=>new Uint32Array(m+1));
  for(let i=n-1;i>=0;i--){
    const dpi=dp[i], dpi1=dp[i+1];
    for(let j=m-1;j>=0;j--){
      if(eq(a[i],b[j])) dpi[j]=dpi1[j+1]+1;
      else dpi[j]=Math.max(dpi1[j], dpi[j+1]);
    }
  }
  const ops=[]; let i=0,j=0;
  while(i<n && j<m){
    if(eq(a[i],b[j])){ ops.push({t:'eq',a:a[i],b:b[j]}); i++; j++; }
    else if(dp[i+1][j]>=dp[i][j+1]){ ops.push({t:'del',a:a[i]}); i++; }
    else { ops.push({t:'ins',b:b[j]}); j++; }
  }
  while(i<n){ ops.push({t:'del',a:a[i]}); i++; }
  while(j<m){ ops.push({t:'ins',b:b[j]}); j++; }
  return ops;
}

function charDiff(a, b){
  const A=Array.from(a), B=Array.from(b);
  if(A.length*B.length > 4000000){
    const r=[];
    if(a) r.push({type:'del', text:a});
    if(b) r.push({type:'ins', text:b});
    return r;
  }
  const ops=lcsOps(A,B,(x,y)=>x===y);
  const merged=[];
  const push=(type,ch)=>{ const l=merged[merged.length-1]; if(l&&l.type===type) l.text+=ch; else merged.push({type,text:ch}); };
  for(const o of ops){
    if(o.t==='eq') push('eq',o.a);
    else if(o.t==='del') push('del',o.a);
    else push('ins',o.b);
  }
  return merged;
}

function fullDiff(left, right){
  let s=0;
  const L=left, R=right;
  const minLen=Math.min(L.length,R.length);
  while(s<minLen && L[s]===R[s]) s++;
  let eL=L.length, eR=R.length;
  while(eL>s && eR>s && L[eL-1]===R[eR-1]){ eL--; eR--; }

  const pre=L.slice(0,s), midL=L.slice(s,eL), midR=R.slice(s,eR), suf=L.slice(eL);

  const out=[];
  if(pre) out.push({type:'eq', text:pre});

  if(midL || midR){
    const la=splitLines(midL), ra=splitLines(midR);
    if(la.length*ra.length > 2500000){
      const lineOps=lcsOps(la,ra,(x,y)=>x===y);
      for(const o of lineOps){
        if(o.t==='eq') out.push({type:'eq',text:o.a});
        else if(o.t==='del') out.push({type:'del',text:o.a});
        else out.push({type:'ins',text:o.b});
      }
    } else {
      const lineOps=lcsOps(la,ra,(x,y)=>x===y);
      let k=0;
      while(k<lineOps.length){
        const o=lineOps[k];
        if(o.t==='eq'){ out.push({type:'eq',text:o.a}); k++; continue; }
        let delBuf='', insBuf='';
        while(k<lineOps.length && lineOps[k].t==='del'){ delBuf+=lineOps[k].a; k++; }
        while(k<lineOps.length && lineOps[k].t==='ins'){ insBuf+=lineOps[k].b; k++; }
        if(delBuf && insBuf){
          for(const c of charDiff(delBuf, insBuf)) out.push(c);
        } else {
          if(delBuf) out.push({type:'del',text:delBuf});
          if(insBuf) out.push({type:'ins',text:insBuf});
        }
      }
    }
  }
  if(suf) out.push({type:'eq', text:suf});

  const merged=[];
  for(const o of out){
    const l=merged[merged.length-1];
    if(l && l.type===o.type) l.text+=o.text;
    else merged.push({...o});
  }
  return merged;
}

function normWs(s){ return s.replace(/[ \t]+/g,' '); }

/* ================= 상태 ================= */
let OPS=[];
let DIFFS=[];
let FILTERED=[];
let leftHasPane=false, rightHasPane=false;

/* ================= 실행 ================= */
function run(){
  const ignoreWs=$('#ignoreWs').checked;
  let l=$('#left').value, r=$('#right').value;
  if(!l && !r){ reset(); return; }
  const cl = ignoreWs ? normWs(l) : l;
  const cr = ignoreWs ? normWs(r) : r;

  OPS = fullDiff(cl, cr);
  buildDiffs();
  renderAll();
}

function buildDiffs(){
  DIFFS=[];
  let i=0, leftSeq=0, rightSeq=0;
  const items=[];
  while(i<OPS.length){
    const o=OPS[i];
    if(o.type==='eq'){ i++; continue; }
    let from='', to='', leftId=null, rightId=null;
    if(o.type==='del'){
      from=o.text; leftId='dL'+(leftSeq++);
      if(OPS[i+1] && OPS[i+1].type==='ins'){ to=OPS[i+1].text; rightId='dR'+(rightSeq++); i+=2; }
      else i++;
    } else {
      to=o.text; rightId='dR'+(rightSeq++); i++;
    }
    items.push({from,to,leftId,rightId});
  }
  DIFFS=items.map((it,idx)=>({...it, pos:idx+1}));
}

/* ================= 렌더 ================= */
function renderAll(){
  const wrap=$('#resultWrap');
  if(!DIFFS.length){
    wrap.innerHTML=`<div class="empty-msg">차이가 없습니다. 두 텍스트가 동일합니다.</div>`;
    return;
  }
  const delN=DIFFS.filter(d=>d.from).length;
  const insN=DIFFS.filter(d=>d.to).length;

  wrap.innerHTML=`
    <div class="diff-head">
      <span class="stat">차이 <b>${DIFFS.length}</b>곳 · <b class="del-c">원본측 ${delN}</b> · <b class="ins-c">대조군측 ${insN}</b></span>
      <div class="filter-box">
        <input type="text" id="filterInput" placeholder="차이 텍스트 검색...">
        <button id="clearFilter">초기화</button>
      </div>
    </div>
    <div class="diff-list-wrap">
      <div class="diff-list" id="diffList">
        <div class="diff-spacer" id="diffSpacer"></div>
      </div>
    </div>

    <div class="panel-controls">
      <span class="pc-label">하단 보기</span>
      <label class="chk"><input type="checkbox" id="showLeft"> 원본 전체</label>
      <label class="chk"><input type="checkbox" id="showRight"> 대조군 전체</label>
      <span class="panel-note" id="panelNote">필요할 때만 켜세요. 분량이 크면 켜는 순간에만 렌더링됩니다.</span>
    </div>
    <div class="panes cols-0" id="panes">
      <div class="pane" id="paneLeft" hidden>
        <div class="pane-title">원본 (ORIGINAL)</div>
        <div class="pane-scroll" id="leftPane"></div>
      </div>
      <div class="pane" id="paneRight" hidden>
        <div class="pane-title">대조군 (COMPARED)</div>
        <div class="pane-scroll" id="rightPane"></div>
      </div>
    </div>
  `;

  FILTERED = DIFFS.map((_,i)=>i);
  leftHasPane=false; rightHasPane=false;
  setupVirtualList();
  bindEvents();
}

/* ---- 가상 스크롤 차이 목록 ---- */
const ROW_H=38;
function setupVirtualList(){
  const list=$('#diffList'), spacer=$('#diffSpacer');
  const renderRows=()=>{
    const total=FILTERED.length;
    spacer.style.height=(total*ROW_H)+'px';
    const scrollTop=list.scrollTop;
    const viewH=list.clientHeight;
    const start=Math.max(0, Math.floor(scrollTop/ROW_H)-5);
    const end=Math.min(total, Math.ceil((scrollTop+viewH)/ROW_H)+5);
    [...list.querySelectorAll('.diff-row')].forEach(n=>n.remove());
    const frag=document.createDocumentFragment();
    for(let v=start; v<end; v++){
      const d=DIFFS[FILTERED[v]];
      const row=document.createElement('div');
      row.className='diff-row';
      row.style.top=(v*ROW_H)+'px';
      row.dataset.di=FILTERED[v];
      const fromHtml = d.from ? `<span class="seg from" title="${esc(d.from)}">${esc(d.from)}</span>`
                              : `<span class="seg empty">(없음)</span>`;
      const toHtml = d.to ? `<span class="seg to" title="${esc(d.to)}">${esc(d.to)}</span>`
                          : `<span class="seg empty">(삭제됨)</span>`;
      row.innerHTML=`<span class="idx">#${d.pos}</span>${fromHtml}<span class="arrow">→</span>${toHtml}<span class="pos-tag">바로가기</span>`;
      frag.appendChild(row);
    }
    list.appendChild(frag);
  };
  list.addEventListener('scroll', renderRows, {passive:true});
  renderRows();
  list._render=renderRows;
}

function applyFilter(q){
  q=q.trim().toLowerCase();
  if(!q) FILTERED=DIFFS.map((_,i)=>i);
  else FILTERED=DIFFS.map((d,i)=>i).filter(i=>{
    const d=DIFFS[i];
    return (d.from && d.from.toLowerCase().includes(q)) || (d.to && d.to.toLowerCase().includes(q));
  });
  const list=$('#diffList'); list.scrollTop=0; list._render();
}

/* ---- 하단 패널 렌더 (지연 렌더) ---- */
function buildPaneHtml(side){
  let html='', seqL=0, seqR=0;
  for(const o of OPS){
    if(o.type==='eq'){ html+=esc(o.text); }
    else if(o.type==='del'){
      if(side==='left') html+=`<span class="chunk del" id="dL${seqL}">${esc(o.text)}</span>`;
      seqL++;
    } else {
      if(side==='right') html+=`<span class="chunk ins" id="dR${seqR}">${esc(o.text)}</span>`;
      seqR++;
    }
  }
  return html;
}

function ensurePane(side){
  if(side==='left' && !leftHasPane){ $('#leftPane').innerHTML=buildPaneHtml('left'); leftHasPane=true; }
  if(side==='right' && !rightHasPane){ $('#rightPane').innerHTML=buildPaneHtml('right'); rightHasPane=true; }
}

function updatePanesLayout(){
  const sl=$('#showLeft').checked, sr=$('#showRight').checked;
  $('#paneLeft').hidden=!sl;
  $('#paneRight').hidden=!sr;
  const panes=$('#panes');
  const n=(sl?1:0)+(sr?1:0);
  panes.className='panes cols-'+n;
}

/* ---- 이벤트 ---- */
function bindEvents(){
  $('#diffList').addEventListener('click', e=>{
    const row=e.target.closest('.diff-row');
    if(!row) return;
    jumpToDiff(DIFFS[+row.dataset.di]);
  });
  $('#filterInput').addEventListener('input', e=>applyFilter(e.target.value));
  $('#clearFilter').addEventListener('click', ()=>{ $('#filterInput').value=''; applyFilter(''); });
  $('#showLeft').addEventListener('change', ()=>{ if($('#showLeft').checked) ensurePane('left'); updatePanesLayout(); });
  $('#showRight').addEventListener('change', ()=>{ if($('#showRight').checked) ensurePane('right'); updatePanesLayout(); });
}

// 패널 컨테이너 '내부'에서만 스크롤 → 대상 chunk 를 패널 맨 위로.
// getBoundingClientRect 로 컨테이너 대비 실제 상대 위치를 구한다(offsetParent 의존 X).
function scrollChunkIntoPane(pane, el){
  const PAD = 8;
  const pr = pane.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  const delta = (er.top - pr.top) - PAD; // 현재 스크롤 기준, 위로 얼마나 올려야 하는지
  const target = pane.scrollTop + delta;
  const max = pane.scrollHeight - pane.clientHeight;
  pane.scrollTo({ top: Math.max(0, Math.min(target, max)), behavior:'smooth' });
}

function jumpToDiff(d){
  // 켜져있지 않으면 양쪽 모두 자동으로 켠다 → 두 패널 동일 위치로 정렬
  if(!$('#showLeft').checked){ $('#showLeft').checked=true; }
  if(!$('#showRight').checked){ $('#showRight').checked=true; }
  ensurePane('left'); ensurePane('right');
  updatePanesLayout();

  document.querySelectorAll('.chunk.flash').forEach(c=>c.classList.remove('flash'));

  const pairs=[
    { paneId:'#leftPane',  chunkId:d.leftId },
    { paneId:'#rightPane', chunkId:d.rightId }
  ];
  // 패널 블록 자체가 화면 밖이면 먼저 화면 안으로 (즉시 이동 → 측정 안정화)
  const panes=$('#panes');
  if(panes){
    const r=panes.getBoundingClientRect();
    if(r.top<0 || r.top>window.innerHeight*0.5){
      panes.scrollIntoView({behavior:'auto', block:'start'});
    }
  }
  // 레이아웃/페이지 스크롤 적용 후 각 패널 내부 스크롤
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      pairs.forEach(p=>{
        if(!p.chunkId) return;
        const el=document.getElementById(p.chunkId);
        const pane=$(p.paneId);
        if(!el || !pane) return;
        scrollChunkIntoPane(pane, el);
        void el.offsetWidth; el.classList.add('flash');
      });
    });
  });
}

function esc(s){ return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function reset(){
  $('#resultWrap').innerHTML=`<div class="empty-msg">텍스트를 입력하고 <b>비교 실행</b>을 누르세요.</div>`;
}

/* ---- 버튼 ---- */
$('#runBtn').addEventListener('click', run);
$('#clearBtn').addEventListener('click', ()=>{ $('#left').value=''; $('#right').value=''; reset(); });
$('#sampleBtn').addEventListener('click', ()=>{
  $('#left').value='진행률은 100% 입니다.\n다음 단계도 100% 완료.\n마지막은 100% 도달.\n승률 50% 유지.';
  $('#right').value='진행률은 95% 입니다.\n다음 단계도 80% 완료.\n마지막은 100% 도달.\n승률 50% 유지.';
  run();
});
document.addEventListener('keydown', e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter') run(); });

/* ================= 파일 첨부 (드래그앤드롭 + 버튼) ================= */
// 워크북 캐시: 시트 선택을 위해 파싱 결과를 보관
const WB = { left:null, right:null }; // {names:[], sheets:{name:tsv}} | null

function sheetTsv(ws){
  return XLSX.utils.sheet_to_csv(ws, {FS:'\t', blankrows:false}).replace(/\r\n/g,'\n').replace(/\s+$/,'');
}

// 워크북 → {names, sheets} 형태로 정규화
function normalizeWb(wb){
  const sheets={};
  wb.SheetNames.forEach(n=>{ sheets[n]=sheetTsv(wb.Sheets[n]); });
  return { names: wb.SheetNames.slice(), sheets };
}

// 선택된 시트(또는 전체)에 해당하는 텍스트 생성
function wbToText(data, selected){
  if(!data) return '';
  if(selected==='__ALL__' || data.names.length===1){
    if(data.names.length===1) return data.sheets[data.names[0]];
    return data.names.map(n=>`### [${n}] ###\n${data.sheets[n]}`).join('\n\n');
  }
  return data.sheets[selected] ?? '';
}

function parseFile(file){
  return new Promise((resolve, reject)=>{
    const name=file.name.toLowerCase();
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('파일을 읽지 못했습니다.'));
    if(/\.(xlsx|xls)$/.test(name)){
      reader.onload=e=>{
        try{
          const wb=XLSX.read(new Uint8Array(e.target.result), {type:'array'});
          resolve({ kind:'wb', data:normalizeWb(wb) });
        }catch(err){ reject(new Error('엑셀 파싱 실패: '+err.message)); }
      };
      reader.readAsArrayBuffer(file);
    } else if(/\.(csv|tsv)$/.test(name)){
      reader.onload=e=>{
        try{
          const wb=XLSX.read(e.target.result, {type:'string'});
          resolve({ kind:'wb', data:normalizeWb(wb) });
        }catch(err){
          resolve({ kind:'text', text:String(e.target.result).replace(/\r\n/g,'\n') });
        }
      };
      reader.readAsText(file, 'utf-8');
    } else {
      reader.onload=e=>resolve({ kind:'text', text:String(e.target.result).replace(/\r\n/g,'\n') });
      reader.readAsText(file, 'utf-8');
    }
  });
}

// 시트 선택 드롭다운 채우기
function populateSheetSelect(side, data){
  const bar=$(side==='left'?'#sheetBarLeft':'#sheetBarRight');
  const sel=$(side==='left'?'#sheetSelLeft':'#sheetSelRight');
  if(!data || data.names.length<=1){ bar.classList.remove('show'); sel.innerHTML=''; return; }
  bar.classList.add('show');
  const opts=[`<option value="__ALL__">전체 시트 (${data.names.length}개)</option>`]
    .concat(data.names.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`));
  sel.innerHTML=opts.join('');
  // 기본값: 첫 시트 (전체보다 시트 단위 비교가 직관적)
  sel.value=data.names[0];
}

// 현재 선택에 맞춰 textarea 갱신
function applySheetSelection(side){
  const data=WB[side];
  if(!data) return;
  const sel=$(side==='left'?'#sheetSelLeft':'#sheetSelRight');
  const chosen = data.names.length<=1 ? '__ALL__' : (sel.value||data.names[0]);
  $(side==='left'?'#left':'#right').value=wbToText(data, chosen);
}

async function handleFile(side, file){
  if(!file) return;
  const cell=$(side==='left'?'#cellLeft':'#cellRight');
  cell.classList.remove('dragover');
  cell.classList.add('parsing');
  try{
    const res=await parseFile(file);
    if(res.kind==='wb'){
      WB[side]=res.data;
      populateSheetSelect(side, res.data);
      // 양쪽에 같은 시트명이 있으면 시트 자동 동기화 시도
      autoSyncSheets(side);
      applySheetSelection(side);
    } else {
      WB[side]=null;
      populateSheetSelect(side, null);
      $(side==='left'?'#left':'#right').value=res.text;
    }
    showFileTag(side, file.name);
  }catch(err){
    alert(err.message);
  }finally{
    cell.classList.remove('parsing');
  }
}

// 한쪽 시트를 고르면, 반대쪽에 같은 이름 시트가 있으면 맞춰준다
function autoSyncSheets(changedSide){
  const other = changedSide==='left' ? 'right' : 'left';
  const a=WB[changedSide], b=WB[other];
  if(!a || !b || a.names.length<=1 || b.names.length<=1) return;
  const selA=$(changedSide==='left'?'#sheetSelLeft':'#sheetSelRight');
  const selB=$(other==='left'?'#sheetSelLeft':'#sheetSelRight');
  const chosen=selA.value;
  if(chosen && chosen!=='__ALL__' && b.sheets[chosen]!==undefined){
    selB.value=chosen;
    applySheetSelection(other);
  } else if(chosen==='__ALL__'){
    selB.value='__ALL__';
    applySheetSelection(other);
  }
}

// 드롭다운 변경 이벤트
$('#sheetSelLeft').addEventListener('change', ()=>{ applySheetSelection('left'); autoSyncSheets('left'); });
$('#sheetSelRight').addEventListener('change', ()=>{ applySheetSelection('right'); autoSyncSheets('right'); });

function showFileTag(side, name){
  const tag=$(side==='left'?'#tagLeft':'#tagRight');
  tag.querySelector('.name').textContent='📄 '+name;
  tag.classList.add('show');
}
function clearFileTag(side){
  $(side==='left'?'#tagLeft':'#tagRight').classList.remove('show');
  $(side==='left'?'#fileLeft':'#fileRight').value='';
  WB[side]=null;
  const bar=$(side==='left'?'#sheetBarLeft':'#sheetBarRight');
  const sel=$(side==='left'?'#sheetSelLeft':'#sheetSelRight');
  bar.classList.remove('show'); sel.innerHTML='';
}

// 버튼 → 파일 선택
document.querySelectorAll('[data-pick]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const side=btn.dataset.pick;
    $(side==='left'?'#fileLeft':'#fileRight').click();
  });
});
$('#fileLeft').addEventListener('change', e=>handleFile('left', e.target.files[0]));
$('#fileRight').addEventListener('change', e=>handleFile('right', e.target.files[0]));

// 파일 태그 ✕
document.querySelectorAll('[data-clearfile]').forEach(x=>{
  x.addEventListener('click', ()=>clearFileTag(x.dataset.clearfile));
});

// 드래그앤드롭 (각 입력칸)
['left','right'].forEach(side=>{
  const cell=$(side==='left'?'#cellLeft':'#cellRight');
  let depth=0;
  cell.addEventListener('dragenter', e=>{ e.preventDefault(); depth++; cell.classList.add('dragover'); });
  cell.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='copy'; });
  cell.addEventListener('dragleave', e=>{ e.preventDefault(); depth--; if(depth<=0){ depth=0; cell.classList.remove('dragover'); } });
  cell.addEventListener('drop', e=>{
    e.preventDefault(); depth=0; cell.classList.remove('dragover');
    const file=e.dataTransfer.files && e.dataTransfer.files[0];
    if(file) handleFile(side, file);
  });
});
// 페이지 전체에 파일이 떨어지면 브라우저가 파일을 여는 것 방지
window.addEventListener('dragover', e=>e.preventDefault());
window.addEventListener('drop', e=>e.preventDefault());

// 지우기 버튼 누르면 파일 태그도 정리
$('#clearBtn').addEventListener('click', ()=>{ clearFileTag('left'); clearFileTag('right'); });
</script>
